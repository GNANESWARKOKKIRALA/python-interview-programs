<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sri Durga</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #ff416c, #ff4b2b);
        font-family: 'Poppins', sans-serif;
        overflow: hidden;
        text-align: center;
        color: white;
    }

    h1 {
        margin-top: 100px;
        font-size: 3.5rem;
        animation: glow 2s infinite alternate;
    }

    h2 {
        font-size: 2.5rem;
        margin-top: 20px;
        animation: fadeIn 3s ease-in-out;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px #fff, 0 0 20px #ff0; }
        to { text-shadow: 0 0 20px #fff, 0 0 40px #ff0; }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Balloons */
    .balloon {
        width: 50px;
        height: 70px;
        background: red;
        border-radius: 50%;
        position: absolute;
        bottom: -100px;
        animation: float 6s infinite ease-in;
    }

    .balloon:nth-child(1) { left: 10%; background: #ffcc00; animation-delay: 0s; }
    .balloon:nth-child(2) { left: 30%; background: #00ffcc; animation-delay: 2s; }
    .balloon:nth-child(3) { left: 50%; background: #ff66cc; animation-delay: 4s; }
    .balloon:nth-child(4) { left: 70%; background: #66ff66; animation-delay: 1s; }
    .balloon:nth-child(5) { left: 90%; background: #6699ff; animation-delay: 3s; }

    @keyframes float {
        0% { transform: translateY(0); }
        100% { transform: translateY(-120vh); }
    }

    /* Button */
    button {
        margin-top: 40px;
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 30px;
        background: #fff;
        color: #ff4b2b;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff4b2b;
        color: white;
    }

    /* Hidden Message */
    #message {
        margin-top: 20px;
        font-size: 1.5rem;
        display: none;
        animation: fadeIn 2s ease-in-out;
    }
</style>
</head>

<body>

<h1>🎂 Happy Birthday 🎉</h1>
<h2>Sri Durga 💖</h2>

<button onclick="showMessage()">Click for Surprise 🎁</button>

<div id="message">
    Wishing you happiness, success, and lots of joy! 🌸✨
</div>

<!-- Balloons -->
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>

<script>
function showMessage() {
    document.getElementById("message").style.display = "block";
}
</script>

</body>
</html>
